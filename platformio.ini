; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:d1_mini_lite]
platform = espressif8266
board = d1_mini
framework = arduino
board_build.partitions = default.csv
lib_deps = 
	bblanchon/ArduinoJson@^7.4.2
	adafruit/Adafruit CCS811 Library@^1.0.0
	adafruit/Adafruit BME280 Library@^2.3.0
	adafruit/Adafruit BMP280 Library@^2.3.0
	adafruit/Adafruit SHT31 Library@^2.2.2
	olikraus/U8g2@^2.34.13
	adafruit/Adafruit BMP3XX Library@^2.1.6
	adafruit/Adafruit NeoPixel@^1.15.5
	adafruit/Adafruit TMP117@^1.0.5
	sensirion/Sensirion I2C SHT4x@^1.1.2
	adafruit/Adafruit MAX31865 library@^1.6.2
build_flags = 
	-DESP8266

	-DMODULE_WIFI
	-DMODULE_WSERVER

	-DMODULE_SHT31
	-DMODULE_LDR

	-DMODULE_OLED

	-DPIN_SDA=0U
	-DPIN_SCL=2U
	
	-DPIN_LDR=17U
	-DSENSOR_UPDATE_RATE=100
	
	-DDEVICE_ID=2

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
board_build.partitions = default.csv
lib_deps = 
	bblanchon/ArduinoJson@^7.4.2
	adafruit/Adafruit CCS811 Library@^1.0.0
	adafruit/Adafruit BME280 Library@^2.3.0
	adafruit/Adafruit BMP280 Library@^2.3.0
	adafruit/Adafruit SHT31 Library@^2.2.2
	olikraus/U8g2@^2.34.13
	adafruit/Adafruit BMP3XX Library@^2.1.6
	adafruit/Adafruit NeoPixel@^1.15.5
	adafruit/Adafruit TMP117@^1.0.5
	sensirion/Sensirion I2C SHT4x@^1.1.2
	adafruit/Adafruit MAX31865 library@^1.6.2
build_flags = 
	-DESP32
	-DMODULE_SERIAL
	; -D ARDUINO_USB_MODE=1
	; -D ARDUINO_USB_CDC_ON_BOOT=1
	
	-DMODULE_WIFI
	-DMODULE_WSERVER

	-DMODULE_BMP388
	-DMODULE_TMP117
	-DMODULE_SHT45
	-DMODULE_MAX31865
	-D MAX31865_RREF=441.9
	
	; -DMODULE_SERIAL_DEBUG
	-DMODULE_NEO_PIXEL
	
	-DPIN_SDA=1
	-DPIN_SCL=0
	
	-DSENSOR_UPDATE_RATE=500
	-DDEVICE_ID=3
